services:
  yaitracker:
    build: .
    container_name: yaitracker
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - yaitracker-data:/data
    environment:
      YAITRACKER_SECRET: "${YAITRACKER_SECRET}"
      YAITRACKER_CORS_ORIGINS: "${YAITRACKER_CORS_ORIGINS:-}"
    read_only: true
    tmpfs:
      - /tmp:size=64M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "/yaitracker", "serve", "--help"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  yaitracker-data:
