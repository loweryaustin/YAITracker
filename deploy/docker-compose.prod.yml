services:
  yaitracker:
    image: yaitracker:${VERSION:-latest}
    container_name: yaitracker
    restart: unless-stopped
    ports:
      - "${DEPLOY_PORT}:8080"
    volumes:
      - ${DEPLOY_DATA_DIR}:/data
    environment:
      YAITRACKER_SECRET: "${YAITRACKER_SECRET}"
    read_only: true
    tmpfs:
      - /tmp:size=64M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "/yaitracker", "serve", "--help"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
